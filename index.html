<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Quentinhas</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448006.png">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        #loginScreen { text-align: center; margin-top: 50px; }
        #loginScreen button { background-color: #4285F4; margin-top: 20px; font-size: 1.1rem;}
        #loginScreen button:hover { background-color: #357ae8; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #btnSair { width: auto; padding: 8px 15px; background-color: #dc3545; font-size: 0.9rem;}
        
        /* Estilo para o seletor de mês */
        .filtro-mes { margin-bottom: 15px; text-align: center; }
        .filtro-mes input { width: auto; display: inline-block; padding: 5px 10px; font-size: 1.1rem; text-align: center; font-weight: bold; color: var(--primary-color);}
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="card">
            <h2>🍲 Controle de Almoço</h2>
            <p>Faça login para acessar suas quentinhas.</p>
            <button id="btnLogin" class="btn-primary">Entrar com o Google</button>
        </div>

        <div id="appScreen" style="display: none;">
            <header class="header-flex">
                <h1>🍲 Almoço</h1>
                <button id="btnSair">Sair</button>
            </header>

            <section class="dashboard card">
                <div class="filtro-mes">
                    <label for="mesFiltro" style="display:none;">Mês:</label>
                    <input type="month" id="mesFiltro">
                </div>

                <div class="valores">
                    <p class="total" id="totalMes">R$ 0,00</p>
                    <span id="statusMes" class="status em-aberto">Fatura em Aberto</span>
                </div>
                <button id="btnPagarMes" class="btn-success">Registrar Pagamento do Mês</button>
            </section>

            <section class="novo-pedido card">
                <h3>Registrar Quentinha</h3>
                <form id="formPedido">
                    <div class="form-group">
                        <label for="dataPedido">Data</label>
                        <input type="date" id="dataPedido" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="qtdQuentinhas">Quantidade de Quentinhas</label>
                        <input type="number" id="qtdQuentinhas" min="1" value="1" required>
                    </div>

                    <div class="form-group">
                        <label for="tamanhoSuco">Adicionar Suco?</label>
                        <select id="tamanhoSuco">
                            <option value="Nenhum">Só a(s) Quentinha(s)</option>
                            <option value="500ml">Suco 500ml</option>
                            <option value="1 Litro">Suco 1 Litro</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Salvar Pedido</button>
                </form>
            </section>

            <section class="historico card">
                <h3>Histórico do Mês</h3>
                <ul id="listaHistorico">
                    <li class="item-historico vazio">Aguardando conexão...</li>
                </ul>
            </section>
        </div>
    </div>

    <script type="module" src="app.js?v=3"></script>
</body>
</html>
